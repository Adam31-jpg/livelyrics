name: LiveLyrics

# ─────────────────────────────────────────────────────────────────────────────
# Définition déclarative du projet Xcode (générée via `xcodegen generate`).
# On ne versionne PAS le .xcodeproj : on le régénère depuis ce fichier.
# ─────────────────────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: com.adamhaouzi.livelyrics
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"                 # Mode 5 = concurrence souple (moins de friction au build)
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "J8N26DNCFN"       # Apple Developer Program — Adam Haouzi
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"          # iPhone uniquement (app iPhone + CarPlay) → pas d'exigence d'orientations iPad
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:

  # ── Framework partagé : modèles, providers, paroles, état partagé ───────────
  LiveLyricsCore:
    type: framework
    platform: iOS
    sources:
      - Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhaouzi.livelyrics.core
        SKIP_INSTALL: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        GENERATE_INFOPLIST_FILE: YES

  # ── App principale (UI plein écran sur iPhone) ──────────────────────────────
  LiveLyrics:
    type: application
    platform: iOS
    sources:
      - Sources/App
    dependencies:
      - target: LiveLyricsCore
      - target: LyricsWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhaouzi.livelyrics
        INFOPLIST_FILE: Sources/App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Resources/LiveLyrics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - LiveLyricsCoreTests
      gatherCoverageData: true

  # ── Tests unitaires de la logique pure (parseur LRC, moteur de synchro) ─────
  LiveLyricsCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: LiveLyricsCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhaouzi.livelyrics.coretests
        GENERATE_INFOPLIST_FILE: YES

  # ── Extension Widget + Live Activity (s'affiche sur CarPlay iOS 26) ──────────
  LyricsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Widget
    dependencies:
      - target: LiveLyricsCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhaouzi.livelyrics.widget
        INFOPLIST_FILE: Sources/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/LyricsWidget.entitlements
